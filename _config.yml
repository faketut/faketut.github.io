title: FengHub
subtitle:
description:
author: Jian Feng
language: en
timezone: Asia/Hong_Kong

url: https://faketut.github.io/
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''

filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''

index_generator:
  path: ''
  per_page: 10
  order_by: -date

# hexo-generator-tag: without this, /tags/ is not generated (404).
tag_generator:
  enable_index_page: true

default_category: uncategorized
category_map:
tag_map:

meta_generator: true

theme: maple

feed:
  type: rss2
  path: rss2.xml
  limit: 20

deploy:
  type: ''
